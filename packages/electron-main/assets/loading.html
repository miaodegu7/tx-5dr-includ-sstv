<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX-5DR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #ffffff;
    color: #374151;
    overflow: hidden;
    -webkit-app-region: drag;
  }

  .shell {
    width: min(860px, calc(100vw - 40px));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    transform: translateY(4vh);
  }

  .startup-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-top-color: #006FEE;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .text {
    margin-top: 16px;
    font-size: 14px;
    opacity: 0.7;
    text-align: center;
  }

  .log-card {
    width: 100%;
    height: min(42vh, 320px);
    padding: 10px 12px;
    overflow: auto;
    border: 0;
    border-radius: 8px;
    background: rgba(17, 24, 39, 0.035);
    color: rgba(55, 65, 81, 0.68);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    -webkit-app-region: no-drag;
  }

  .log-card.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: #000000;
      color: #a1a1aa;
    }

    .spinner {
      border-color: rgba(255, 255, 255, 0.1);
      border-top-color: #3b82f6;
    }

    .log-card {
      background: rgba(255, 255, 255, 0.055);
      color: rgba(212, 212, 216, 0.66);
    }

    .log-card.empty {
      color: #71717a;
    }
  }

  @media (max-width: 640px) {
    .shell {
      width: calc(100vw - 24px);
      transform: translateY(2vh);
    }

    .log-card {
      height: 48vh;
      font-size: 9px;
    }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="startup-mark">
      <div class="spinner"></div>
      <div class="text" id="loading-text">Starting...</div>
    </div>
    <pre class="log-card empty" id="log-card">Waiting for log output...</pre>
  </div>
  <script>
    const zh = (navigator.language || '').toLowerCase().startsWith('zh');
    const text = {
      loading: zh ? '正在启动...' : 'Starting...',
      waiting: zh ? '等待日志输出...' : 'Waiting for log output...',
      unavailable: zh ? '日志接口不可用' : 'Startup log API unavailable',
    };
    document.getElementById('loading-text').textContent = text.loading;

    const logCard = document.getElementById('log-card');
    const MAX_RENDERED_LINES = 300;
    let lines = [];
    let unsubscribe = null;

    function renderLines() {
      const shouldStick = logCard.scrollHeight - logCard.scrollTop - logCard.clientHeight < 32;
      if (lines.length === 0) {
        logCard.classList.add('empty');
        logCard.textContent = text.waiting;
        return;
      }

      logCard.classList.remove('empty');
      logCard.textContent = lines.map(line => line.text).join('\n');

      if (shouldStick) {
        logCard.scrollTop = logCard.scrollHeight;
      }
    }

    function applyPayload(payload) {
      if (payload.snapshot) {
        lines = payload.lines || [];
      } else if (payload.lines && payload.lines.length > 0) {
        lines = lines.concat(payload.lines);
      }
      if (lines.length > MAX_RENDERED_LINES) {
        lines = lines.slice(-MAX_RENDERED_LINES);
      }
      renderLines();
    }

    async function subscribeLogs() {
      const api = window.electronAPI && window.electronAPI.startupLogs;
      if (!api || typeof api.subscribe !== 'function') {
        lines = [{ text: text.unavailable }];
        renderLines();
        return;
      }

      try {
        unsubscribe = await api.subscribe(applyPayload);
      } catch (error) {
        lines = [{
          text: `${text.unavailable}: ${error && error.message ? error.message : String(error)}`,
        }];
        renderLines();
      }
    }

    window.addEventListener('beforeunload', () => {
      if (unsubscribe) {
        void unsubscribe();
        unsubscribe = null;
      }
    });

    renderLines();
    void subscribeLogs();
  </script>
</body>
</html>
